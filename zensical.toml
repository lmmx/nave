[project]
site_name = "Nave"
site_url = "https://lmmx.github.io/nave"
site_description = "nave: fleet-level ops for OSS repos"
site_author = "Louis Maddox"
docs_dir = "docs"
repo_name = "lmmx/nave"
repo_url = "https://github.com/lmmx/nave"
# Navigation
nav = [
  {"Home" = "index.md"},
  {"Concepts" = [
    "concepts/fleet.md",
    "concepts/fleet-model.md",
    "concepts/state-model.md",
    "concepts/query-language.md",
    "concepts/query-language-spec.md",
    "concepts/cache.md",
    "concepts/operations.md",
    "concepts/cli-model.md",
    "concepts/config-model.md",
    "concepts/pens.md",
    "concepts/pen-lifecycle.md"
  ]},
  {"Lifecycle" = [
    "lifecycle/overview.md",
    "lifecycle/flow.md",
    "lifecycle/stages.md",
    "lifecycle/state-flow.md"
  ]},
  {"Examples" = [
    "examples/search-fleet.md",
    "examples/drift-analysis.md",
    "examples/pen-workflow.md",
    "examples/task-based.md",
    "examples/real-world.md"
  ]},
  {"CLI" = [
    "reference/cli/overview.md",
    "reference/cli/nave.md",
    "reference/cli/init.md",
    "reference/cli/scan.md",
    "reference/cli/pull.md",
    "reference/cli/search.md",
    "reference/cli/build.md",
    "reference/cli/check.md",
    "reference/cli/schemas.md",
    "reference/cli/pen.md",
    "reference/cli/pen/create.md",
    "reference/cli/relationships.md"
  ]}
]

[project.markdown_extensions.pymdownx.snippets]

[project.plugins.search]

[project.theme]
variant = "modern"
language = "en"
features = [
  "navigation.instant",
  "navigation.top",
  "search.suggest",
  "search.highlight",
  "content.code.copy"
]

# Light / dark mode toggle
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
