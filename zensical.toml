[project]
site_name = "Nave"
site_url = "https://lmmx.github.io/nave"
site_description = "Fleet-level operations for OSS package repos"
site_author = "Louis Maddox"
docs_dir = "docs"
repo_name = "lmmx/nave"
repo_url = "https://github.com/lmmx/nave"
nav = [
  {"Home" = "index.md"},
  {"Concepts" = [
    "concepts/fleet.md",
    "concepts/core-primitives.md",
    "concepts/cache.md",
    "concepts/query-language.md",
    "concepts/templates.md",
    "concepts/schemas.md",
    "concepts/pens.md",
    "concepts/operations.md",
    "concepts/config.md"
  ]},
  {"Lifecycle" = [
    "lifecycle/overview.md",
    "lifecycle/invariants.md"
  ]},
  {"Examples" = [
    "examples/drift-analysis.md",
    "examples/search-fleet.md",
    "examples/lower-bound-rollout.md",
    "examples/binding-surveillance.md"
  ]},
  {"CLI" = [
    "reference/cli/overview.md",
    "reference/cli/nave.md",
    "reference/cli/init.md",
    "reference/cli/scan.md",
    "reference/cli/pull.md",
    "reference/cli/search.md",
    "reference/cli/build.md",
    "reference/cli/check.md",
    "reference/cli/schemas.md",
    "reference/cli/pen.md",
    "reference/cli/pen/create.md",
    "reference/cli/pen/list.md",
    "reference/cli/pen/show.md",
    "reference/cli/pen/status.md",
    "reference/cli/pen/sync.md",
    "reference/cli/pen/clean.md",
    "reference/cli/pen/revert.md",
    "reference/cli/pen/reinit.md",
    "reference/cli/pen/exec.md",
    "reference/cli/pen/rm.md",
    "reference/cli/relationships.md"
  ]}
]

[project.markdown_extensions.pymdownx.highlight]

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.superfences]

[project.plugins.search]

[project.theme]
logo = "assets/images/nave.svg"
variant = "modern"
language = "en"
features = [
  "navigation.instant",
  "navigation.top",
  "search.suggest",
  "search.highlight",
  "content.code.copy"
]

# Light / dark mode toggle
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
